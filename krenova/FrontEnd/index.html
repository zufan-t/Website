<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathTrans - Game Rute Semarang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen text-gray-800 font-sans">

    <div class="w-full max-w-md p-6 bg-white rounded-xl shadow-lg border border-gray-200 fade-in" id="app-container">

        <div id="view-landing" class="text-center space-y-8">
            <h1 class="text-5xl font-bold text-green-600 tracking-wide">MathTrans</h1>
            <p class="text-gray-500">Uji kemampuan aljabar di game rute Trans Semarang!</p>
            <button onclick="mulaiGame()"
                class="w-full py-3 bg-green-500 hover:bg-green-600 text-white font-bold text-xl rounded-lg shadow-md transition-all">
                MULAI
            </button>
        </div>

        <div id="view-soal" class="hidden space-y-6 fade-in">
            <div class="p-4 bg-green-50 border-l-4 border-green-500 rounded-r-lg">
                <h2 class="text-sm font-semibold text-green-700 uppercase tracking-wider mb-2">Soal</h2>
                <p id="teks-soal" class="text-lg font-medium text-gray-800">Memuat soal...</p>
            </div>

            <div id="pilihan-jawaban-container" class="space-y-3">
            </div>

            <button id="btn-konfirmasi" onclick="konfirmasiJawaban()"
                class="w-full py-3 mt-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg transition-all hidden shadow-md">
                KONFIRMASI JAWABAN
            </button>
        </div>

        <div id="view-hasil" class="hidden space-y-4 fade-in">
            <div class="p-4 bg-gray-100 rounded-lg">
                <p class="text-sm text-gray-500 mb-1">Soal:</p>
                <p id="hasil-soal" class="font-medium text-gray-800"></p>
            </div>

            <div class="p-4 rounded-lg border-2 text-center" id="box-status">
                <p class="text-sm mb-1">Pilihan Jawabanmu:</p>
                <p id="hasil-pilihan" class="text-xl font-bold mb-2"></p>
                <div id="badge-status" class="inline-block px-4 py-1 rounded-full text-white font-bold text-lg"></div>
            </div>

            <div id="box-kunci"
                class="p-4 bg-blue-50 text-blue-800 rounded-lg border border-blue-200 hidden text-center">
                <p class="text-sm">Jawaban Benar:</p>
                <p id="hasil-kunci" class="font-bold text-lg"></p>
            </div>

            <div class="pt-4 space-y-3">
                <button onclick="mulaiGame()"
                    class="w-full py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg transition-all">
                    MULAI LAGI
                </button>
                <button onclick="selesaiGame()"
                    class="w-full py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-lg transition-all">
                    SELESAI
                </button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
